<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Calculator app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="calc">
        <p>calc</p>
        <div>
          <p class="Theme">Theme</p>
          <div class="toggle">
            <div id="toggleState"></div>
          </div>
        </div>
      </div>
      <div class="out">
        <p class="outPut">0</p>
      </div>
      <main class="con1">
        <div class="num">
          <button value="7" class="btn">7</button>
          <button value="8" class="btn">8</button>
          <button value="9" class="btn">9</button>
          <button class="delete btn">Del</button>
          <button value="4" class="btn">4</button>
          <button value="5" class="btn">5</button>
          <button value="6" class="btn">6</button>
          <button value="+" class="btn">+</button>
          <button value="1" class="btn">1</button>
          <button value="2" class="btn">2</button>
          <button value="3" class="btn">3</button>
          <button value="-" class="btn">-</button>
          <button value="." class="btn">.</button>
          <button value="0" class="btn">0</button>
          <button value="/" class="btn">/</button>
          <button value="*" class="btn">x</button>
          <button class="reset">RESET</button>
          <button class="reset">=</button>
        </div>
      </main>
    </div>

    <!--   
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  </body>
  <script src="app.js"></script>
</html>
